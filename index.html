<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>House on the Rock — Static</title>
    <meta name="description" content="Static wrapper that loads a full homepage copy and rewrites root-relative URLs to the live domain">
    <style>body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:2rem;color:#222}</style>
  </head>
  <body>
    <h1>House on the Rock — Loading site...</h1>
    <p>If you see this message for more than a couple seconds, the site failed to load.</p>
    <script>
      // Load the full saved homepage and rewrite root-relative URLs to point to the live site
      fetch('site/index.html')
        .then(function(resp){
          if(!resp.ok) throw new Error(resp.status + ' ' + resp.statusText);
          return resp.text();
        })
        .then(function(html){
          // Rewrite attributes like href="/..." and src="/..."
          html = html.replace(/(href|src)=(["'])\//gi, '$1=$2https://www.thehouseontherock.com/');
          // Rewrite CSS url(/...)
          html = html.replace(/url\(\//gi, 'url(https://www.thehouseontherock.com/');
          // Inject the modified HTML as the full document
          document.open();
          document.write(html);
          document.close();
        })
        .catch(function(err){
          document.body.innerHTML = '<h1>Failed to load site</h1><pre>' + String(err) + '</pre>';
          console.error(err);
        });
    </script>
  </body>
</html>
