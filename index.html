<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>House on the Rock — Static</title>
    <meta name="description" content="Static wrapper that loads the `Old` HTML file to serve the site on GitHub Pages">
    <style>body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:2rem;color:#222}</style>
  </head>
  <body>
    <h1>House on the Rock — Loading site...</h1>
    <p>If you see this message for more than a couple seconds, the site failed to load.</p>
    <script>
      // Fetch and replace the document with the contents of `Old`.
      fetch('Old')
        .then(function(resp){
          if(!resp.ok) throw new Error(resp.status + ' ' + resp.statusText);
          return resp.text();
        })
        .then(function(html){
          document.open();
          document.write(html);
          document.close();
        })
        .catch(function(err){
          document.body.innerHTML = '<h1>Failed to load site</h1><pre>' + err + '</pre>';
          console.error(err);
        });
    </script>
  </body>
</html>
